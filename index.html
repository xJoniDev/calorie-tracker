<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/images/favicon.ico">
    <title>Calorie Tracker</title>
</head>
<body>
   <div id="main-container">
    <h1 id="main-title">Calorie Tracker</h1>
    <p id="main-description">Track your daily calorie intake and stay healthy!</p>
    <h4 id="login-title">Login:</h4>
    <input id="email-login" type="email" placeholder="Enter your email">
    <input id="password-login" type="password" placeholder="Enter your password">
    <button id="login-button" onclick="login()">Submit</button>

    <a id="register-link" href="register.html">Don't have an account? Register here.</a>
   </div>

    <script src="script.js"></script>
</body>
</html>
