<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/images/favicon.ico">
    <title>Calorie Tracker – App</title>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <img src="assets/images/nutrition_icon.png" class="nav-logo">
            <h2 class="nav-title">Calorie Tracker</h2>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="#" id="logout-btn" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>

    <div id="main-container">
        <h1>Calorie & Nutrition Planner</h1>
        <p>Enter your details to see recommended daily calorie intake.</p>

        <div class="form-row">
            <label for="age">Age (years)</label>
            <input id="age" type="number" min="0" placeholder="Years" required>
        </div>

        <div class="form-row">
            <label for="gender">Gender</label>
            <select id="gender" required>
                <option value="">-- Select --</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div class="form-row">
            <label for="weight">Weight (kg)</label>
            <input id="weight" type="number" min="1" placeholder="kg" required>
        </div>

        <div class="form-row">
            <label for="height">Height (cm)</label>
            <input id="height" type="number" min="30" placeholder="cm" required>
        </div>

        <div class="form-row">
            <label for="activity">Activity Level</label>
            <select id="activity" required>
                <option value="">-- Select --</option>
                <option value="1.2">Sedentary (little or no exercise)</option>
                <option value="1.375">Lightly active (1–3 days/week)</option>
                <option value="1.55">Moderately active (3–5 days/week)</option>
                <option value="1.725">Very active (6–7 days/week)</option>
                <option value="1.9">Extra active (hard exercise)</option>
            </select>
        </div>
        <div class="form-row">
            <button id="calculate" class="button-primary" onclick="calculate()">Calculate</button>
        </div>
        <div id="result" aria-live="polite"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
