<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/images/favicon.ico">
    <title>Calorie Tracker</title>
</head>
<body>
    <h1>Calorie Tracker</h1>
    <p>Track your daily calorie intake and stay healthy!</p>
    <input type="number" placeholder="Enter your age">
    <input type="text" placeholder="Enter your gender">
    <input type="number" placeholder="Enter your weight (kg)">
    <input type="number" placeholder="Enter your height (cm)">
    <input type="number" placeholder="Enter your daily calorie intake">
    <button>Submit</button>
</body>
